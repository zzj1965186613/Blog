<header class="site-header" role="banner">
  <div class="header-inner">
    <a class="site-brand" href="{{ site.baseurl }}/">
      <span class="site-title">{{ site.title }}</span>
    </a>

    <nav class="site-nav" role="navigation" aria-label="Main navigation">
      <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-hidden="true">
      <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle navigation menu">
        <span class="hamburger">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </label>

      <ul class="nav-links">
        <li><a href="{{ site.baseurl }}/">Home</a></li>
        <li><a href="{{ site.baseurl }}/about/">About</a></li>
        <li><a href="{{ site.baseurl }}/feed.xml">RSS</a></li>
        <li>
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">&#127769;</button>
        </li>
      </ul>
    </nav>
  </div>
</header>

<script>
(function() {
  var toggle = document.getElementById('theme-toggle');
  if (!toggle) return;

  function getTheme() {
    return localStorage.getItem('theme') ||
      (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  }

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    toggle.textContent = theme === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
    localStorage.setItem('theme', theme);
  }

  applyTheme(getTheme());

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  });
})();
</script>
