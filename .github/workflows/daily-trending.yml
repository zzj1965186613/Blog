name: Daily AI Trending Update

on:
  schedule:
    # 每天早上8点（UTC时间0点）自动执行
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update-blog:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Blog repo
        uses: actions/checkout@v4
        with:
          repository: zzj1965186613/Blog
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
          
      - name: Check if already updated today
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          if ls _posts/${TODAY}* 1>/dev/null 2>&1; then
            echo "already_updated=true" >> $GITHUB_OUTPUT
            echo "✅ 今日已更新，跳过"
          else
            echo "already_updated=false" >> $GITHUB_OUTPUT
            echo "📝 需要更新"
          fi
          
      - name: Fetch GitHub Trending
        if: steps.check.outputs.already_updated == 'false'
        run: |
          python << 'PYTHON'
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime
          import json
          
          def fetch_trending():
              url = "https://github.com/trending"
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
              }
              
              try:
                  resp = requests.get(url, headers=headers, timeout=30)
                  resp.raise_for_status()
                  return resp.text
              except Exception as e:
                  print(f"Error: {e}")
                  return None
          
          def parse_trending(html):
              if not html:
                  return []
              
              soup = BeautifulSoup(html, 'html.parser')
              articles = soup.select('article.Box-row')
              projects = []
              
              for article in articles:
                  try:
                      h2 = article.select_one('h2 a')
                      if not h2:
                          continue
                      repo_path = h2.get('href', '').strip('/')
                      repo_url = f"https://github.com/{repo_path}"
                      
                      desc_elem = article.select_one('p')
                      description = desc_elem.text.strip() if desc_elem else "暂无描述"
                      
                      lang_elem = article.select_one('[itemprop="programmingLanguage"]')
                      language = lang_elem.text.strip() if lang_elem else "N/A"
                      
                      star_link = article.select_one('a[href$="/stargazers"]')
                      stars = star_link.text.strip().replace(',', '') if star_link else "0"
                      
                      fork_link = article.select_one('a[href$="/forks"]')
                      forks = fork_link.text.strip().replace(',', '') if fork_link else "0"
                      
                      added_elem = article.find(string=lambda t: t and 'stars today' in t)
                      added = added_elem.strip() if added_elem else ""
                      
                      projects.append({
                          'name': repo_path,
                          'url': repo_url,
                          'description': description,
                          'language': language,
                          'stars': stars,
                          'forks': forks,
                          'added': added
                      })
                  except Exception as e:
                      continue
              
              return projects
          
          def is_ai_related(project):
              ai_keywords = [
                  'ai', 'agent', 'llm', 'model', 'gpt', 'claude', 'openai', 
                  'machine-learning', 'deep-learning', 'neural', 'transformer',
                  'langchain', 'autogen', 'copilot', 'skill', 'rag', 'embedding',
                  'vector', 'chatbot', 'nlp', 'computer-vision', 'diffusion',
                  'tensorflow', 'pytorch', 'keras', 'huggingface', 'mistral',
                  'gemini', 'anthropic', 'ollama', 'vllm', 'llamaindex'
              ]
              
              text = f"{project['name']} {project['description']}".lower()
              return any(kw in text for kw in ai_keywords)
          
          def generate_article(projects, limit=15):
              today = datetime.now().strftime("%Y-%m-%d")
              ai_projects = [p for p in projects if is_ai_related(p)][:limit]
              
              if not ai_projects:
                  ai_projects = projects[:limit]
              
              content = f"""---
          layout: post
          title: "GitHub AI 热门项目日报 - {today}"
          date: {today}
          categories: [GitHub 开源 AI]
          tags: [GitHub 开源 热门项目 AI Agent LLM]
          ---
          
          > 🔥 每日精选 GitHub 上最热门的 AI、Agent、LLM 相关开源项目，帮你把握技术脉搏。
          
          ## 📅 今日热门榜
          
          """
              
              for i, p in enumerate(ai_projects, 1):
                  medal = "🥇" if i == 1 else "🥈" if i == 2 else "🥉" if i == 3 else f"#{i}"
                  added_line = f"\n- 📈 **今日新增:** {p['added']}" if p['added'] else ""
                  
                  content += f"""## {medal} [{p['name']}]({p['url']})
          
          **{p['description']}**
          
          - ⭐ **Stars:** {p['stars']}
          - 🍴 **Forks:** {p['forks']}
          - 💻 **语言:** {p['language']}{added_line}
          - 🔗 **地址:** [{p['name']}]({p['url']})
          
          ---
          
          """
              
              content += f"""
          ---
          
          *数据来源: [GitHub Trending](https://github.com/trending)*
          *更新时间: {datetime.now().strftime("%Y-%m-%d %H:%M")}*
          """
              
              return content
          
          # 执行
          html = fetch_trending()
          if html:
              projects = parse_trending(html)
              print(f"📊 共抓取 {len(projects)} 个项目")
              
              article = generate_article(projects)
              
              today = datetime.now().strftime("%Y-%m-%d")
              filename = f"_posts/{today}-github-ai-trending.markdown"
              
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(article)
              
              print(f"✅ 文章已保存到: {filename}")
          else:
              print("❌ 抓取失败")
              exit(1)
          PYTHON
          
      - name: Commit and push
        if: steps.check.outputs.already_updated == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          TODAY=$(date +%Y-%m-%d)
          git add _posts/
          git commit -m "📝 更新GitHub AI热门项目日报 - ${TODAY}"
          git push
          
      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.already_updated }}" == "true" ]; then
            echo "✅ 今日已更新，无需操作"
          else
            echo "✅ 成功更新GitHub AI热门项目日报"
            echo "🔗 查看: https://zzj1965186613.github.io/Blog/"
          fi
