name: Daily AI Trending Update

on:
  schedule:
    # Run daily at 8:00 AM (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Check if already updated today
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          if ls _posts/${TODAY}* 1>/dev/null 2>&1; then
            echo "already_updated=true" >> $GITHUB_OUTPUT
            echo "Already updated today, skipping."
          else
            echo "already_updated=false" >> $GITHUB_OUTPUT
            echo "Need to update."
          fi

      - name: Fetch GitHub Trending
        if: steps.check.outputs.already_updated == 'false'
        run: |
          python << 'PYTHON'
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime
          import json

          def fetch_trending():
              url = "https://github.com/trending"
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
              }

              try:
                  resp = requests.get(url, headers=headers, timeout=30)
                  resp.raise_for_status()
                  return resp.text
              except Exception as e:
                  print(f"Error: {e}")
                  return None

          def parse_trending(html):
              if not html:
                  return []

              soup = BeautifulSoup(html, 'html.parser')
              articles = soup.select('article.Box-row')
              projects = []

              for article in articles:
                  try:
                      h2 = article.select_one('h2 a')
                      if not h2:
                          continue
                      repo_path = h2.get('href', '').strip('/')
                      repo_url = f"https://github.com/{repo_path}"

                      desc_elem = article.select_one('p')
                      description = desc_elem.text.strip() if desc_elem else "No description"

                      lang_elem = article.select_one('[itemprop="programmingLanguage"]')
                      language = lang_elem.text.strip() if lang_elem else "N/A"

                      star_link = article.select_one('a[href$="/stargazers"]')
                      stars = star_link.text.strip().replace(',', '') if star_link else "0"

                      fork_link = article.select_one('a[href$="/forks"]')
                      forks = fork_link.text.strip().replace(',', '') if fork_link else "0"

                      added_elem = article.find(string=lambda t: t and 'stars today' in t)
                      added = added_elem.strip() if added_elem else ""

                      projects.append({
                          'name': repo_path,
                          'url': repo_url,
                          'description': description,
                          'language': language,
                          'stars': stars,
                          'forks': forks,
                          'added': added
                      })
                  except Exception as e:
                      continue

              return projects

          def is_ai_related(project):
              ai_keywords = [
                  'ai', 'agent', 'llm', 'model', 'gpt', 'claude', 'openai',
                  'machine-learning', 'deep-learning', 'neural', 'transformer',
                  'langchain', 'autogen', 'copilot', 'skill', 'rag', 'embedding',
                  'vector', 'chatbot', 'nlp', 'computer-vision', 'diffusion',
                  'tensorflow', 'pytorch', 'keras', 'huggingface', 'mistral',
                  'gemini', 'anthropic', 'ollama', 'vllm', 'llamaindex'
              ]

              text = f"{project['name']} {project['description']}".lower()
              return any(kw in text for kw in ai_keywords)

          def generate_article(projects, limit=15):
              today = datetime.now().strftime("%Y-%m-%d")
              ai_projects = [p for p in projects if is_ai_related(p)][:limit]

              if not ai_projects:
                  ai_projects = projects[:limit]

              content = f"""---
          layout: post
          title: "GitHub AI Trending Daily - {today}"
          date: {today}
          categories: [GitHub, AI]
          tags: [GitHub, AI, Agent, LLM]
          ---

          > Daily curated list of the hottest AI, Agent, and LLM open-source projects on GitHub, helping you stay on top of tech trends.

          ## Trending Today

          """

              for i, p in enumerate(ai_projects, 1):
                  medal = ":trophy:" if i == 1 else ":second_place_medal:" if i == 2 else ":third_place_medal:" if i == 3 else f"#{i}"
                  added_line = f"\n- :fire: **Added today:** {p['added']}" if p['added'] else ""

                  content += f"""## {medal} [{p['name']}]({p['url']})

          **{p['description']}**

          - :star2: **Stars:** {p['stars']}
          - :fork_and_knife: **Forks:** {p['forks']}
          - :speech_balloon: **Language:** {p['language']}{added_line}
          - :link: **Link:** [{p['name']}]({p['url']})

          ---

          """

              content += f"""
          ---

          *Data source: [GitHub Trending](https://github.com/trending)*
          *Updated: {datetime.now().strftime("%Y-%m-%d %H:%M")}*
          """

              return content

          # Main
          html = fetch_trending()
          if html:
              projects = parse_trending(html)
              print(f"Fetched {len(projects)} projects")

              article = generate_article(projects)

              today = datetime.now().strftime("%Y-%m-%d")
              filename = f"_posts/{today}-github-ai-trending.markdown"

              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(article)

              print(f"Article saved to: {filename}")
          else:
              print("Failed to fetch trending data")
              exit(1)
          PYTHON

      - name: Commit and push
        if: steps.check.outputs.already_updated == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TODAY=$(date +%Y-%m-%d)
          git add _posts/
          git commit -m "Update GitHub AI Trending Daily - ${TODAY}"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.already_updated }}" == "true" ]; then
            echo "Already updated today, no action needed."
          else
            echo "Successfully updated GitHub AI Trending Daily."
            echo "View: https://zzj1965186613.github.io/Blog/"
          fi
