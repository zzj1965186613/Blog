name: Daily AI Trending Update

on:
  schedule:
    # 姣忓ぉ鏃╀笂8鐐癸紙UTC鏃堕棿0鐐癸級鑷姩鎵ц
    - cron: '0 0 * * *'
  workflow_dispatch:  # 鍏佽鎵嬪姩瑙﹀彂


permissions:
  contents: write
jobs:
  update-blog:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Check if already updated today
        id: check
        run: |
          TODAY=$(date +%Y-%m-%d)
          if ls _posts/${TODAY}* 1>/dev/null 2>&1; then
            echo "already_updated=true" >> $GITHUB_OUTPUT
            echo "鉁?浠婃棩宸叉洿鏂帮紝璺宠繃"
          else
            echo "already_updated=false" >> $GITHUB_OUTPUT
            echo "馃摑 闇€瑕佹洿鏂?
          fi

      - name: Fetch GitHub Trending
        if: steps.check.outputs.already_updated == 'false'
        run: |
          python << 'PYTHON'
          import requests
          from bs4 import BeautifulSoup
          from datetime import datetime
          import json

          def fetch_trending():
              url = "https://github.com/trending"
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
              }

              try:
                  resp = requests.get(url, headers=headers, timeout=30)
                  resp.raise_for_status()
                  return resp.text
              except Exception as e:
                  print(f"Error: {e}")
                  return None

          def parse_trending(html):
              if not html:
                  return []

              soup = BeautifulSoup(html, 'html.parser')
              articles = soup.select('article.Box-row')
              projects = []

              for article in articles:
                  try:
                      h2 = article.select_one('h2 a')
                      if not h2:
                          continue
                      repo_path = h2.get('href', '').strip('/')
                      repo_url = f"https://github.com/{repo_path}"

                      desc_elem = article.select_one('p')
                      description = desc_elem.text.strip() if desc_elem else "鏆傛棤鎻忚堪"

                      lang_elem = article.select_one('[itemprop="programmingLanguage"]')
                      language = lang_elem.text.strip() if lang_elem else "N/A"

                      star_link = article.select_one('a[href$="/stargazers"]')
                      stars = star_link.text.strip().replace(',', '') if star_link else "0"

                      fork_link = article.select_one('a[href$="/forks"]')
                      forks = fork_link.text.strip().replace(',', '') if fork_link else "0"

                      added_elem = article.find(string=lambda t: t and 'stars today' in t)
                      added = added_elem.strip() if added_elem else ""

                      projects.append({
                          'name': repo_path,
                          'url': repo_url,
                          'description': description,
                          'language': language,
                          'stars': stars,
                          'forks': forks,
                          'added': added
                      })
                  except Exception as e:
                      continue

              return projects

          def is_ai_related(project):
              ai_keywords = [
                  'ai', 'agent', 'llm', 'model', 'gpt', 'claude', 'openai',
                  'machine-learning', 'deep-learning', 'neural', 'transformer',
                  'langchain', 'autogen', 'copilot', 'skill', 'rag', 'embedding',
                  'vector', 'chatbot', 'nlp', 'computer-vision', 'diffusion',
                  'tensorflow', 'pytorch', 'keras', 'huggingface', 'mistral',
                  'gemini', 'anthropic', 'ollama', 'vllm', 'llamaindex'
              ]

              text = f"{project['name']} {project['description']}".lower()
              return any(kw in text for kw in ai_keywords)

          def generate_article(projects, limit=15):
              today = datetime.now().strftime("%Y-%m-%d")
              ai_projects = [p for p in projects if is_ai_related(p)][:limit]

              if not ai_projects:
                  ai_projects = projects[:limit]

              content = f"""---
          layout: post
          title: "GitHub AI 鐑棬椤圭洰鏃ユ姤 - {today}"
          date: {today}
          categories: [GitHub 寮€婧?AI]
          tags: [GitHub 寮€婧?鐑棬椤圭洰 AI Agent LLM]
          ---

          > 馃敟 姣忔棩绮鹃€?GitHub 涓婃渶鐑棬鐨?AI銆丄gent銆丩LM 鐩稿叧寮€婧愰」鐩紝甯綘鎶婃彙鎶€鏈剦鎼忋€?

          ## 馃搮 浠婃棩鐑棬姒?

          """

              for i, p in enumerate(ai_projects, 1):
                  medal = "馃" if i == 1 else "馃" if i == 2 else "馃" if i == 3 else f"#{i}"
                  added_line = f"\n- 馃搱 **浠婃棩鏂板:** {p['added']}" if p['added'] else ""

                  content += f"""## {medal} [{p['name']}]({p['url']})

          **{p['description']}**

          - 猸?**Stars:** {p['stars']}
          - 馃嵈 **Forks:** {p['forks']}
          - 馃捇 **璇█:** {p['language']}{added_line}
          - 馃敆 **鍦板潃:** [{p['name']}]({p['url']})

          ---

          """

              content += f"""
          ---

          *鏁版嵁鏉ユ簮: [GitHub Trending](https://github.com/trending)*
          *鏇存柊鏃堕棿: {datetime.now().strftime("%Y-%m-%d %H:%M")}*
          """

              return content

          # 鎵ц
          html = fetch_trending()
          if html:
              projects = parse_trending(html)
              print(f"馃搳 鍏辨姄鍙?{len(projects)} 涓」鐩?)

              article = generate_article(projects)

              today = datetime.now().strftime("%Y-%m-%d")
              filename = f"_posts/{today}-github-ai-trending.markdown"

              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(article)

              print(f"鉁?鏂囩珷宸蹭繚瀛樺埌: {filename}")
          else:
              print("鉂?鎶撳彇澶辫触")
              exit(1)
          PYTHON

      - name: Commit and push
        if: steps.check.outputs.already_updated == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TODAY=$(date +%Y-%m-%d)
          git add _posts/
          git commit -m "馃摑 鏇存柊GitHub AI鐑棬椤圭洰鏃ユ姤 - ${TODAY}"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.already_updated }}" == "true" ]; then
            echo "鉁?浠婃棩宸叉洿鏂帮紝鏃犻渶鎿嶄綔"
          else
            echo "鉁?鎴愬姛鏇存柊GitHub AI鐑棬椤圭洰鏃ユ姤"
            echo "馃敆 鏌ョ湅: https://zzj1965186613.github.io/Blog/"
          fi


